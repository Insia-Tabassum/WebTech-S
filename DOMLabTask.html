<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DOM Lab Task - Table Version</title>
<style>
    body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 20px auto;
    }
    label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
    }
    input[type="text"] {
        padding: 5px;
        width: 250px;
        margin-bottom: 5px;
    }
    button {
        padding: 5px 10px;
        margin-bottom: 10px;
        border-radius: 5px;
        border: none;
        background-color: blue;
        color: white;
        cursor: pointer;
    }
    button:hover {
        background-color: darkblue;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
    }
    th, td {
        border: 1px solid #ccc;
        padding: 8px;
        text-align: left;
    }
    tr:nth-child(even) {
        background-color: wheat;
    }
    tr:hover {
        background-color: cornsilk;
    }
    .present {
        background-color: lightgreen !important;
    }
    .highlight {
        background-color: rgba(0, 174, 255, 0.952) !important;
    }
    #message {
        color: red;
        font-weight: bold;
        margin-bottom: 5px;
    }
</style>
</head>
<body>

<h2>Student List </h2>


<label for="roll">Roll No:</label>
<input type="text" id="roll" placeholder="Enter Roll No">
<label for="name">Student Name:</label>
<input type="text" id="name" placeholder="Enter Student Name">
<button id="addBtn" disabled>Add Student</button>

<p id="message"></p>


<input type="text" id="search" placeholder="Search student"><br><br>


<button onclick="sortStudents()">Sort A–Z</button>
<button onclick="highlightFirst()">Highlight First Student</button>
<button onclick="clearAll()">Clear All</button>


<table id="studentTable">
    <thead>
        <tr>
            <th>Roll No</th>
            <th>Name</th>
            <th>Present</th>
            <th>Edit</th>
            <th>Delete</th>
        </tr>
    </thead>
    <tbody>
    
    </tbody>
</table>

<p id="count">Total students: 0</p>
<p id="status">Present: 0, Absent: 0</p>

<script>
const rollInput = document.getElementById("roll");
const nameInput = document.getElementById("name");
const addBtn = document.getElementById("addBtn");
const tableBody = document.querySelector("#studentTable tbody");
const countText = document.getElementById("count");
const statusText = document.getElementById("status");
const searchInput = document.getElementById("search");
const message = document.getElementById("message");


nameInput.addEventListener("input", () => {
    addBtn.disabled = nameInput.value.trim() === "";
});


addBtn.addEventListener("click", () => {
    const roll = rollInput.value.trim();
    const name = nameInput.value.trim();
    message.textContent = "";

    if(!roll || !name) return;

    
    let duplicate = false;
    [...tableBody.rows].forEach(row => {
        if(row.cells[0].textContent === roll) duplicate = true;
    });
    if(duplicate) {
        message.textContent = "This Roll number already exists!";
        return;
    }

    
    const row = document.createElement("tr");

    
    const rollCell = document.createElement("td");
    rollCell.textContent = roll;

    
    const nameCell = document.createElement("td");
    nameCell.textContent = name;

    
    const presentCell = document.createElement("td");
    const presentCheck = document.createElement("input");
    presentCheck.type = "checkbox";
    presentCheck.addEventListener("change", updateStatus);
    presentCell.appendChild(presentCheck);

    
    const editCell = document.createElement("td");
    const editBtn = document.createElement("button");
    editBtn.textContent = "Edit";
    editBtn.onclick = () => {
        const newRoll = prompt("Enter new roll:", rollCell.textContent);
        const newName = prompt("Enter new name:", nameCell.textContent);
        if(!newRoll || !newName) return;

        
        let dup = false;
        [...tableBody.rows].forEach(r => {
            if(r.cells[0].textContent === newRoll && r !== row) dup = true;
        });
        if(dup) {
            alert("This Roll number already exists!");
            return;
        }

        rollCell.textContent = newRoll;
        nameCell.textContent = newName;
    };
    editCell.appendChild(editBtn);

    
    const deleteCell = document.createElement("td");
    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "Delete";
    deleteBtn.onclick = () => {
        if(confirm("Are you sure you want to delete this student?")) {
            row.remove();
            updateCount();
            updateStatus();
        }
    };
    deleteCell.appendChild(deleteBtn);

    row.append(rollCell, nameCell, presentCell, editCell, deleteCell);
    tableBody.appendChild(row);

    rollInput.value = "";
    nameInput.value = "";
    addBtn.disabled = true;

    updateCount();
    updateStatus();
});


function updateCount() {
    countText.textContent = `Total students: ${tableBody.rows.length}`;
}


function updateStatus() {
    let total = tableBody.rows.length;
    let present = 0;
    [...tableBody.rows].forEach(row => {
        if(row.cells[2].firstChild.checked) present++;
    });
    statusText.textContent = `Present: ${present}, Absent: ${total - present}`;
}


searchInput.addEventListener("input", () => {
    const value = searchInput.value.toLowerCase();
    [...tableBody.rows].forEach(row => {
        const text = row.cells[0].textContent + " " + row.cells[1].textContent;
        row.style.display = text.toLowerCase().includes(value) ? "" : "none";
    });
});


function sortStudents() {
    const rows = [...tableBody.rows];
    rows.sort((a,b) => a.cells[1].textContent.toLowerCase().localeCompare(b.cells[1].textContent.toLowerCase()));
    rows.forEach(row => tableBody.appendChild(row));
}


function highlightFirst() {
    [...tableBody.rows].forEach(row => row.classList.remove("highlight"));
    if(tableBody.firstElementChild) tableBody.firstElementChild.classList.add("highlight");
}


function clearAll() {
    if(confirm("Delete all students?")) {
        tableBody.innerHTML = "";
        updateCount();
        updateStatus();
    }
}
</script>

</body>
</html>
