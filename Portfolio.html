<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio</title>
  <link rel="stylesheet" href="p_style.css" />
</head>
<body>
  <header class="header">
    <nav class="navbar container">
      <h1 class="logo">MyPortfolio</h1>
      <ul class="nav-links">
        <li><a href="#home">Home</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
      <button id="theme-toggle" class="theme-btn">🌙</button>
    </nav>
  </header>

  <main>
    <!-- Home Section -->
    <section id="home" class="hero container">
      <div class="hero-text">
        <h2>Hello, I'm <span class="highlight">Insia Tabassum</span></h2>
        <h3>I am <span id="typing-text"></span></h3>
        <p>
          Welcome to my personal portfolio website. I am a passionate student
          interested in web development, programming, and problem solving.
        </p>
        <a href="#projects" class="btn">View My Work</a>
      </div>
      <div class="hero-image">
        <img src="/KDL-114827 (1).JPG" alt="Profile Image" />
      </div>
    </section>

    <!-- Projects Section -->
    <section id="projects" class="projects-section">
      <div class="container">
        <h2 class="section-title">My Projects</h2>

        <div class="filter-buttons">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="web">Web</button>
          <button class="filter-btn" data-filter="app">App</button>
          <button class="filter-btn" data-filter="design">Design</button>
        </div>

        <div id="project-container" class="project-grid"></div>
      </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="contact-section">
      <div class="container">
        <h2 class="section-title">Contact Me</h2>
        <form id="contact-form" novalidate>
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" />
            <small class="error" id="name-error"></small>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" />
            <small class="error" id="email-error"></small>
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" />
            <small class="error" id="subject-error"></small>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" rows="5"></textarea>
            <small class="error" id="message-error"></small>
          </div>

          <button type="submit" class="btn">Send Message</button>
          <p id="success-message" class="success-message"></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Insia Tabassum. All Rights Reserved.</p>
  </footer>

  <button id="scroll-top-btn" title="Go to top">↑</button>

  <script src="p_script.js"></script>
</body>
</html>
